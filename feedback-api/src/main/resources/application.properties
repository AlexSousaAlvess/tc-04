quarkus.lambda.handler=feedback-handler

quarkus.sqs.aws.region=${AWS_REGION:us-east-1}
quarkus.sqs.aws.credentials.type=default

app.sqs.feedback-queue-url=${FEEDBACK_QUEUE_URL}

quarkus.jackson.serialization-inclusion=non-null

quarkus.log.level=INFO
quarkus.log.category."br.com.fiap".level=DEBUG

%dev.quarkus.sqs.endpoint-override=http://localhost:4566
%dev.app.sqs.feedback-queue-url=http://localhost:4566/000000000000/feedback-queue.fifo
