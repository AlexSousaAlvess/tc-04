quarkus.lambda.handler=report-handler

quarkus.ses.aws.region=${AWS_REGION:us-east-1}
quarkus.ses.aws.credentials.type=default

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:feedbackdb}
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=5

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

app.admin.email=${ADMIN_EMAIL}
app.ses.sender-email=${SES_SENDER_EMAIL}

quarkus.log.level=INFO
quarkus.log.category."br.com.fiap".level=DEBUG

%dev.quarkus.ses.endpoint-override=http://localhost:4566
%dev.app.admin.email=admin@fiap.com.br
%dev.app.ses.sender-email=noreply@fiap.com.br
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/feedbackdb
